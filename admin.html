<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECHELON '26 | COMMAND CENTER</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --gold: #D4AF37; --maroon: #4B0036; --bg: #0f0f0f; --card: #1a1a1a; --text: #f5f1e6; --success: #28a745; --danger: #dc3545; }
    body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; overflow-x: hidden; }

    /* Login UI */
    #login-screen { position: fixed; inset: 0; background: radial-gradient(circle, var(--maroon) 0%, #000 100%); z-index: 4000; display: flex; align-items: center; justify-content: center; }
    .login-box { background: var(--card); padding: 40px; border-radius: 15px; border: 2px solid var(--gold); text-align: center; width: 90%; max-width: 400px; box-shadow: 0 0 30px rgba(212,175,55,0.2); }
    .login-box input { display: block; width: 100%; padding: 12px; margin: 20px 0; background: #000; color: #fff; border: 1px solid var(--gold); border-radius: 5px; text-align: center; box-sizing: border-box; }
    .login-box button { background: var(--gold); color: var(--maroon); border: none; padding: 12px 40px; cursor: pointer; font-weight: bold; border-radius: 5px; font-family: 'Cinzel'; width: 100%; transition: 0.3s; }
    .login-box button:hover { letter-spacing: 2px; background: #fff; }

    /* Header & Presence */
    header { background: var(--maroon); padding: 10px 30px; border-bottom: 3px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
    .presence-container { display: flex; gap: 10px; align-items: center; }
    .presence-pill { 
        display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.4); 
        padding: 5px 12px; border-radius: 20px; border: 1px solid var(--gold);
        animation: slideInRight 0.5s ease-out;
    }
    .presence-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 8px var(--success); }
    .presence-name { font-size: 0.75rem; font-weight: bold; color: var(--gold); text-transform: uppercase; }

    /* Navigation */
    .nav { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
    .nav button { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 10px 25px; cursor: pointer; font-family: 'Cinzel'; transition: 0.3s; border-radius: 4px; }
    .nav button.active { background: var(--gold); color: var(--maroon); font-weight: bold; transform: scale(1.05); }

    /* Tables & Cards */
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 50px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
    .stat-card { background: var(--card); padding: 20px; border-radius: 10px; border-top: 3px solid var(--gold); text-align: center; }
    
    .table-wrapper { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #333; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #222; color: var(--gold); padding: 15px; font-family: 'Cinzel'; font-size: 0.8rem; text-align: left; }
    td { padding: 12px 15px; border-bottom: 1px solid #222; font-size: 0.9rem; }

    /* Activity Sidebar */
    #activity-sidebar {
      position: fixed; right: -320px; top: 60px; width: 300px; height: calc(100vh - 60px);
      background: #111; border-left: 2px solid var(--gold); z-index: 2000;
      transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 20px; box-sizing: border-box;
      overflow-y: auto;
    }
    #activity-sidebar.open { right: 0; }
    .activity-item { 
        padding: 10px; border-bottom: 1px solid #222; font-size: 0.8rem; 
        animation: fadeIn 0.3s ease; border-left: 3px solid transparent;
    }
    .activity-item.important { border-left-color: var(--gold); background: rgba(212,175,55,0.05); }
    .activity-time { color: #888; font-size: 0.7rem; display: block; margin-bottom: 4px; }

    /* Animations */
    @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .btn-loading { pointer-events: none; opacity: 0.5; }
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="login-box">
      <h1 style="font-family:'Cinzel'; color:var(--gold); margin:0;">ECHELON '26</h1>
      <p style="letter-spacing: 3px; font-size: 0.7rem; margin-bottom:30px; color: #aaa;">OPERATIONS DECK</p>
      <input type="password" id="adminPass" placeholder="ADMIN ACCESS KEY">
      <button id="authBtn" onclick="checkLogin()">AUTHORIZE</button>
    </div>
  </div>

  <div id="admin-content" style="display:none;">
    <header>
      <div style="display:flex; align-items:center; gap:20px;">
        <h2 style="font-family:'Cinzel'; color:var(--gold); margin:0; font-size:1.2rem;">COMMAND CENTER</h2>
        <div class="presence-container" id="live-presence">
            </div>
      </div>
      <button onclick="window.location.reload()" style="background:var(--danger); border:none; padding:8px 15px; color:#fff; border-radius:4px; font-weight:bold; cursor:pointer;">EXIT</button>
    </header>

    <div class="nav">
      <button onclick="showTab('dashboard')" class="tab-btn active" id="btn-dashboard">DASHBOARD</button>
      <button onclick="showTab('pending')" class="tab-btn" id="btn-pending">QUEUE</button>
      <button onclick="showTab('all')" class="tab-btn" id="btn-all">MASTER RECORDS</button>
    </div>

    <div class="container">
      <section id="dashboard" class="tab-content active">
        <div class="stats-grid">
          <div class="stat-card"><h3 style="font-size:0.7rem; color:var(--gold);">TOTAL</h3><p id="stat-total" style="font-size:2rem; margin:5px 0;">0</p></div>
          <div class="stat-card"><h3 style="font-size:0.7rem; color:var(--success);">APPROVED</h3><p id="stat-approved" style="font-size:2rem; margin:5px 0;">0</p></div>
          <div class="stat-card"><h3 style="font-size:0.7rem; color:#f57f17;">PENDING</h3><p id="stat-pending" style="font-size:2rem; margin:5px 0;">0</p></div>
        </div>
        
        <h3 style="font-family:'Cinzel'; border-bottom:1px solid #333; padding-bottom:10px;">Event Saturation</h3>
        <div id="capacity-trackers" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:15px;"></div>
      </section>

      <section id="pending" class="tab-content" style="display:none;">
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Reg ID</th><th>Lead Name</th><th>Event</th><th>Institution</th><th>Actions</th></tr></thead>
                <tbody id="pending-body"></tbody>
            </table>
        </div>
      </section>

      <section id="all" class="tab-content" style="display:none;">
        <div class="table-wrapper">
            <table id="allTable">
                <thead><tr><th>Timestamp</th><th>Reg ID</th><th>Lead Name</th><th>Event</th><th>Status</th></tr></thead>
                <tbody id="all-body"></tbody>
            </table>
        </div>
      </section>
    </div>

    <div id="activity-sidebar">
      <h4 style="font-family:'Cinzel'; color:var(--gold); border-bottom:1px solid #333; margin-top:0; padding-bottom:10px;">Audit Trail</h4>
      <div id="activity-list"></div>
    </div>
    
    <div onclick="toggleSidebar()" style="position:fixed; bottom:25px; right:25px; background:var(--gold); width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--maroon); cursor:pointer; box-shadow:0 5px 15px rgba(0,0,0,0.5); z-index:2100;">
        <i class="fas fa-history"></i>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby3ArMAcA7iRpNs2YhW3ggNgfwoXpOBPXCon11BAxr0YRudOysAXQY5OSTIs5uow8c/exec"; 
    let adminName = "", adminId = "", fullData = [], logs = [];

    async function checkLogin() {
        const pass = document.getElementById('adminPass').value;
        const btn = document.getElementById('authBtn');
        btn.innerText = "AUTHORIZING...";
        btn.classList.add('btn-loading');

        try {
            const resp = await fetch(`${SCRIPT_URL}?action=getAdminData&key=${pass}`);
            const data = await resp.json();
            
            if (data === "UNAUTHORIZED") {
                alert("Access Denied");
                btn.innerText = "AUTHORIZE";
                btn.classList.remove('btn-loading');
                return;
            }

            adminName = data.adminName;
            adminId = pass;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            
            refreshUI(data);
            // Start Live Polling (Every 15 seconds)
            setInterval(pollData, 15000);

        } catch (e) { alert("Connection Error"); }
    }

    function refreshUI(data) {
        fullData = data.rows;
        logs = data.logs; // "All activities" from sheet
        updatePresence(data.activeAdmins);
        renderLogs();
        renderTables();
        renderStats(data.config);
    }

    async function pollData() {
        const resp = await fetch(`${SCRIPT_URL}?action=getAdminData&key=${adminId}`);
        const data = await resp.json();
        refreshUI(data);
    }

    function updatePresence(admins) {
        const container = document.getElementById('live-presence');
        container.innerHTML = admins.map(a => `
            <div class="presence-pill">
                <div class="presence-dot"></div>
                <span class="presence-name">${a}</span>
            </div>
        `).join('');
    }

    function renderLogs() {
        const container = document.getElementById('activity-list');
        // logs[0] = Timestamp, [1] = Admin, [2] = Action, [3] = Target
        container.innerHTML = logs.slice(1).reverse().map(l => `
            <div class="activity-item ${l[2].includes('DELETE') ? 'important' : ''}">
                <span class="activity-time">${l[0]}</span>
                <strong>${l[1]}</strong> ${l[2]} <span style="color:var(--gold)">${l[3]}</span>
            </div>
        `).join('');
    }

    function renderTables() {
        const pBody = document.getElementById('pending-body');
        const aBody = document.getElementById('all-body');
        pBody.innerHTML = ""; aBody.innerHTML = "";

        let t = 0, a = 0, p = 0;

        fullData.slice(1).forEach((row, index) => {
            const status = row[13] || "PENDING";
            t++; if(status === "APPROVED") a++; else if(status === "PENDING") p++;

            const rowHtml = `<td>${row[4]}</td><td>${row[8]}</td><td>${row[3]}</td><td>${row[5]}</td>`;
            
            if(status === "PENDING") {
                pBody.innerHTML += `<tr>${rowHtml}<td><button onclick="action(${index+2}, 'APPROVED')">✓</button></td></tr>`;
            }
            aBody.innerHTML += `<tr><td>${row[0]}</td><td>${row[4]}</td><td>${row[8]}</td><td>${row[3]}</td><td>${status}</td></tr>`;
        });

        document.getElementById('stat-total').innerText = t;
        document.getElementById('stat-approved').innerText = a;
        document.getElementById('stat-pending').innerText = p;
    }

    async function action(rowId, type) {
        await fetch(`${SCRIPT_URL}?action=updateStatus&rowId=${rowId}&newStatus=${type}&key=${adminId}`, {method: 'POST'});
        pollData();
    }

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-'+id).classList.add('active');
    }

    function toggleSidebar() { document.getElementById('activity-sidebar').classList.toggle('open'); }
  </script>
</body>
</html>
